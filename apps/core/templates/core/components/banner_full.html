{% load ui_tags %}
<section class="w-full py-24 relative overflow-hidden"
    style="background-color: var(--color-{{banner.bg_color|default:'bg-primary'}}); color: var(--color-{{banner.text_color|default:'bg-primary'}});">

    {% if hero_image %}
    <div class="absolute inset-0">
        <img src="{{ hero_image.file.url }}"
             alt="{{ hero_image.alt_text|default:'' }}"
             class="w-full h-full object-cover opacity-40">
    </div>
    {% endif %}

    <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
        <h1 class="text-5xl font-bold mb-4">
            {{ banner.title }}
        </h1>
        <p class="text-xl text-gray-600">
            {{ banner.content }}
        </p>
        {% if banner.button %}
            {% render_button button=banner.button %}
        {% endif %}
    </div>
</section>
