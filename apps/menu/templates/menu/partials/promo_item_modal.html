<div
  x-data="promoItemModal()"
  x-on:open-promo-modal.window="open($event.detail)"
  x-on:keydown.escape.window="close()"
  class="menu-modal-root"
>
  {# ── Backdrop ── #}
  <div
    x-show="isOpen"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    x-on:click="close()"
    class="menu-modal-backdrop"
    aria-hidden="true"
    style="display:none;"
  ></div>

  {# ── Panel ── #}
  <div
    x-show="isOpen"
    x-transition:enter="transition ease-out duration-250"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-4"
    role="dialog"
    aria-modal="true"
    :aria-label="item.name"
    class="menu-modal-panel"
    style="display:none;"
  >
    <div class="menu-modal-body surface-light" style="grid-template-columns: 1fr; max-width: 520px;">

      <button x-on:click="close()" class="menu-modal-close" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div class="menu-modal-details">

        <div class="menu-modal-header">
          <h2 class="t-title t-subheading pr-8" x-text="item.name"></h2>
          <div x-show="item.note">
            <span class="t-badge badge-seasonal" x-text="item.note"></span>
          </div>
        </div>

        <div
          class="menu-modal-description t-description-full ck-content"
          x-show="item.description"
          x-html="item.description"
        ></div>

        <div class="menu-modal-price-footer" x-show="item.promo_price">
          <span class="t-price t-price-lg" x-text="item.promo_price"></span>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  function promoItemModal() {
    return {
      isOpen: false,
      item: { name: '', description: '', promo_price: null, note: '' },

      open(data) {
        this.item = data;
        this.isOpen = true;
        document.body.style.overflow = 'hidden';
      },

      close() {
        this.isOpen = false;
        document.body.style.overflow = '';
        setTimeout(() => {
          this.item = { name: '', description: '', promo_price: null, note: '' };
        }, 200);
      }
    };
  }
</script>
